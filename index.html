<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Club Fixtures &amp; Pitch Planner</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root{
    /* Termonfeckin Celtic FC — purple frame, emerald green, white, gold */
    --purple:#3c2251; --purple-deep:#2c1740; --purple-soft:#4d2f66;
    --green:#00975a; --green-deep:#007647; --green-line:#1aac6f;
    --gold:#f5c518; --gold-deep:#d9aa0e;
    --turf:#00975a; --turf-deep:#007647; --turf-line:#1aac6f;
    --chalk:#f6f3f9; --ink:#241333; --ash:#6b5f78;
    --senior:#00975a; --junior:#7a4ea0; --away:#a98a2f;
    --card:#ffffff; --rule:#e4dcec; --warn:#c0392b;
    --shadow:0 1px 2px rgba(60,34,81,.07),0 8px 24px rgba(60,34,81,.10);
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{
    font-family:"Inter","Segoe UI",system-ui,sans-serif;
    color:var(--ink); background:#eef2ec;
    -webkit-font-smoothing:antialiased;
  }
  h1,h2,h3{font-family:"Bebas Neue","Arial Narrow",sans-serif;font-weight:400;letter-spacing:.02em;margin:0}
  /* ---- header ---- */
  header{
    background:linear-gradient(180deg,var(--purple) 0%,var(--purple-deep) 100%);
    color:var(--chalk); padding:20px 20px 22px; position:relative; overflow:hidden;
    border-bottom:4px solid var(--green);
  }
  header::after{
    content:""; position:absolute; right:-90px; top:-90px; width:280px; height:280px;
    border-radius:50%; border:14px solid var(--green); opacity:.16; pointer-events:none;
  }
  .head-row{position:relative;z-index:1;display:flex;justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap;max-width:1180px;margin:0 auto}
  .crest{display:flex;align-items:center;gap:16px}
  .crest img{width:66px;height:66px;border-radius:50%;flex:none;box-shadow:0 2px 8px rgba(0,0,0,.35)}
  header h1{font-size:clamp(28px,5vw,48px);line-height:.92}
  header .eyebrow{font:600 11px/1 "Inter",sans-serif;letter-spacing:.26em;text-transform:uppercase;color:var(--gold);margin-bottom:7px}
  .io-btns{display:flex;gap:8px;flex-wrap:wrap}
  .io-btns button{font-size:12px;padding:8px 12px}
  /* ---- layout ---- */
  main{max-width:1180px;margin:0 auto;padding:20px 20px 80px}
  .tabs{display:flex;gap:4px;margin:18px 0 8px;border-bottom:2px solid var(--rule)}
  .tab{appearance:none;border:0;background:none;font:600 14px/1 "Inter";color:var(--ash);padding:12px 16px;cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px}
  .tab[aria-selected="true"]{color:var(--ink);border-bottom-color:var(--purple)}
  .week-nav{display:flex;align-items:center;gap:12px;margin:18px 0;flex-wrap:wrap}
  .week-nav h2{font-size:26px}
  .week-nav .sub{font:500 13px/1 "Inter";color:var(--ash)}
  /* ---- buttons ---- */
  button{cursor:pointer;font-family:inherit}
  .btn{border:1px solid var(--rule);background:var(--card);color:var(--ink);border-radius:8px;padding:9px 14px;font:600 13px/1 "Inter";transition:.15s}
  .btn:hover{border-color:var(--turf);color:var(--turf-deep)}
  .btn.primary{background:var(--turf);border-color:var(--turf);color:#fff}
  .btn.primary:hover{background:var(--turf-deep);color:#fff}
  .btn.ghost{background:rgba(255,255,255,.12);border-color:rgba(255,255,255,.45);color:#fff}
  .btn.ghost:hover{background:rgba(245,197,24,.25);border-color:var(--gold);color:#fff}
  .icon-btn{border:0;background:none;color:var(--ash);font-size:18px;padding:4px 8px;border-radius:6px}
  .icon-btn:hover{background:#e7ede7;color:var(--ink)}
  /* ---- pitch grid ---- */
  .grid-wrap{overflow-x:auto;border-radius:14px;box-shadow:var(--shadow);background:var(--card)}
  table.grid{border-collapse:collapse;width:100%;min-width:760px}
  .grid th,.grid td{border:1px solid var(--rule);vertical-align:top}
  .grid thead th{background:var(--turf-deep);color:var(--chalk);font:600 12px/1.2 "Inter";text-transform:uppercase;letter-spacing:.06em;padding:10px 8px;position:sticky;top:0}
  .grid thead th.today{background:var(--green);box-shadow:inset 0 -3px 0 var(--gold)}
  .pitch-cell{width:88px;background:#f6faf6;font:600 13px/1.2 "Inter";color:var(--turf-deep);padding:14px 10px;text-align:left}
  .pitch-cell small{display:block;font-weight:500;color:var(--ash);font-size:11px;margin-top:3px}
  .slot{min-width:120px;padding:6px;height:100%}
  .slot.empty{background:repeating-linear-gradient(45deg,#fafdfa,#fafdfa 8px,#f1f6f1 8px,#f1f6f1 16px)}
  .add-slot{display:block;width:100%;border:1px dashed var(--rule);background:none;color:var(--ash);border-radius:7px;padding:8px;font:500 12px/1 "Inter"}
  .add-slot:hover{border-color:var(--turf);color:var(--turf-deep)}
  .booking{border-radius:8px;padding:8px 9px;margin-bottom:6px;color:#fff;cursor:pointer;position:relative}
  .booking .time{font:700 12px/1 "Inter";opacity:.95}
  .booking .team{font:600 13px/1.25 "Inter";margin-top:2px}
  .booking .meta{font:500 11px/1.3 "Inter";opacity:.92;margin-top:3px}
  .booking.senior{background:var(--senior)}
  .booking.junior{background:var(--junior)}
  .booking .ref-flag{position:absolute;top:6px;right:6px;font-size:10px;background:rgba(0,0,0,.22);padding:2px 5px;border-radius:5px;font-weight:700;letter-spacing:.04em}
  .clash{outline:3px solid var(--warn);outline-offset:-3px}
  /* ---- match calendar ---- */
  .cal-group{margin:0 0 22px;border-radius:14px;overflow:hidden;box-shadow:var(--shadow);background:var(--card)}
  .cal-group-head{padding:11px 16px;color:#fff;font:700 15px/1.2 "Inter";display:flex;justify-content:space-between;align-items:baseline;gap:10px}
  .cal-group-head small{font-weight:500;opacity:.9;font-size:12px}
  .cal-group.all .cal-group-head{background:var(--purple)}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr)}
  .cal-col{border-right:1px solid var(--rule);min-height:56px;padding:6px}
  .cal-col:last-child{border-right:0}
  .cal-col-head{font:600 11px/1.2 "Inter";color:var(--ash);text-transform:uppercase;letter-spacing:.04em;padding:8px 6px 6px;border-right:1px solid var(--rule);text-align:center;background:#f6faf6}
  .cal-col-head:last-child{border-right:0}
  .cal-col-head.today{background:var(--green);color:#fff;border-radius:0}
  .cal-fix{border-radius:7px;padding:6px 7px;margin-bottom:5px;cursor:pointer;color:#fff;font-size:12px;line-height:1.3}
  .cal-fix:last-child{margin-bottom:0}
  .cal-fix.home{background:var(--turf)}
  .cal-fix.away{background:var(--away)}
  .cal-fix .t{font-weight:700}
  .cal-fix .vs{opacity:.95}
  .cal-fix .ha{font-size:9px;font-weight:700;letter-spacing:.06em;opacity:.85}
  .cal-fix .ref{font-size:10px;opacity:.92;margin-top:2px;font-style:italic}
  .cal-fix .csc{font-weight:800;font-size:13px;margin-top:2px;display:flex;align-items:center;gap:5px}
  .cal-fix .oc{font-size:9px;font-weight:800;padding:1px 5px;border-radius:6px;background:rgba(255,255,255,.22)}
  .cal-empty{color:var(--ash);font-size:11px;opacity:.5;text-align:center;padding:6px 0}
  @media (max-width:720px){
    .cal-grid{grid-template-columns:1fr}
    .cal-col-head{display:none}
    .cal-col{border-right:0;border-bottom:1px solid var(--rule);min-height:0}
    .cal-col:last-child{border-bottom:0}
    .cal-col::before{content:attr(data-day);display:block;font:600 11px/1 "Inter";color:var(--ash);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px}
    .cal-col.cal-blank{display:none}
  }
  /* ---- legend ---- */
  .legend{display:flex;gap:18px;flex-wrap:wrap;margin:14px 2px;font:500 12px/1 "Inter";color:var(--ash)}
  .legend span{display:inline-flex;align-items:center;gap:7px}
  .chip{width:14px;height:14px;border-radius:4px;display:inline-block}
  /* ---- list / table ---- */
  .list-head{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:12px}
  .filters{display:flex;gap:8px;flex-wrap:wrap}
  select,input,textarea{font-family:inherit;font-size:14px;border:1px solid var(--rule);border-radius:8px;padding:9px 10px;background:#fff;color:var(--ink)}
  select:focus,input:focus,textarea:focus{outline:2px solid var(--turf-line);outline-offset:1px;border-color:var(--turf)}
  table.fx{border-collapse:collapse;width:100%;background:var(--card);border-radius:12px;overflow:hidden;box-shadow:var(--shadow)}
  .fx th{background:#f6faf6;text-align:left;font:600 11px/1 "Inter";text-transform:uppercase;letter-spacing:.06em;color:var(--ash);padding:11px 12px;border-bottom:1px solid var(--rule)}
  .fx td{padding:11px 12px;border-bottom:1px solid var(--rule);font-size:13.5px;vertical-align:top}
  .fx tr:last-child td{border-bottom:0}
  .fx tr:hover td{background:#fbfdfb}
  .pill{font:600 11px/1 "Inter";padding:4px 8px;border-radius:99px;display:inline-block}
  .pill.home{background:#e3f1e8;color:var(--turf-deep)}
  .pill.away{background:#e7eaf5;color:var(--away)}
  .pill.senior{background:#e3f1e8;color:var(--turf-deep)}
  .pill.junior{background:#ece1f5;color:#5a3580}
  .muted{color:var(--ash)}
  .score{font-weight:700}
  .outcome{font-size:11px;font-weight:800;padding:1px 6px;border-radius:6px;color:#fff;margin-left:2px}
  .outcome.W{background:var(--green-deep)}
  .outcome.L{background:var(--warn)}
  .outcome.D{background:var(--ash)}
  .empty-state{text-align:center;padding:60px 20px;color:var(--ash)}
  .empty-state h3{font-size:28px;color:var(--ink);margin-bottom:6px}
  /* ---- modal ---- */
  .scrim{position:fixed;inset:0;background:rgba(16,36,26,.45);display:none;align-items:flex-start;justify-content:center;padding:32px 16px;z-index:50;overflow:auto}
  .scrim.open{display:flex}
  .modal{background:#fff;border-radius:16px;max-width:520px;width:100%;box-shadow:0 24px 60px rgba(0,0,0,.3);overflow:hidden}
  .modal header{background:var(--turf-deep);padding:18px 22px}
  .modal header::after{display:none}
  .modal header h3{color:#fff;font-size:24px}
  .modal .body{padding:20px 22px}
  .field{margin-bottom:14px}
  .field label{display:block;font:600 12px/1 "Inter";color:var(--ash);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px}
  .field input,.field select,.field textarea{width:100%}
  .field textarea{resize:vertical;min-height:54px}
  .two{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .modal .actions{display:flex;justify-content:space-between;gap:10px;padding:16px 22px;background:#f6faf6;border-top:1px solid var(--rule)}
  .ref-note{font:500 12px/1.4 "Inter";color:var(--ash);background:#f1e9f7;border-left:3px solid var(--purple);padding:8px 10px;border-radius:6px;margin-top:-4px;margin-bottom:14px;display:none}
  .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;padding:12px 20px;border-radius:10px;font:600 13px/1 "Inter";opacity:0;transition:.25s;z-index:60;pointer-events:none}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  @media (max-width:640px){
    .fx thead{display:none}
    .fx,.fx tbody,.fx tr,.fx td{display:block;width:100%}
    .fx tr{border-bottom:8px solid #eef2ec;background:#fff;border-radius:10px;margin-bottom:8px}
    .fx td{border:0;padding:6px 14px}
    .fx td::before{content:attr(data-l);display:block;font:600 10px/1 "Inter";text-transform:uppercase;letter-spacing:.06em;color:var(--ash);margin-bottom:3px}
    .two{grid-template-columns:1fr}
  }
</style>
</head>

<!-- MODAL -->
<div class="scrim" id="scrim">
  <div class="modal" role="dialog" aria-modal="true">

<div class="toast" id="toast"></div>

<script>
(function(){
"use strict";
const KEY="club-fixtures-v1";
const DAYS=["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
const TEAMS=[
  "U8 Boys","U9 Boys","U10 Boys","U11 Boys","U12 Boys","U13 Boys","U14 Boys","U15 Boys","U16 Boys",
  "U10 Girls","U14 Girls","U15 Girls","U16 Girls",
  "Senior Women","Senior Men"];
// Age number drives pitch + referee rules, regardless of Boys/Girls suffix.
function ageNum(team){ const m=/U(\d+)/.exec(team||""); return m?+m[1]:99; }   // Senior teams -> 99
function isJunior(team){ return ageNum(team)<=12; }                            // U8–U12 = Junior pitch
function noRefAge(team){ const a=ageNum(team); return a>=8&&a<=11; }            // U8–U11 = no referee
const NO_REF={ has:noRefAge };          // keep existing .has() callers working
function pitchFor(team){ return isJunior(team) ? "Junior" : "Senior"; }

// ---------- storage ----------
let state = load();
function load(){
  try{ const r=localStorage.getItem(KEY); if(r) return JSON.parse(r); }catch(e){}
  return {club:"Termonfeckin Celtic FC", fixtures:[]};
}
function save(){ try{ localStorage.setItem(KEY, JSON.stringify(state)); }catch(e){ toast("Could not save — storage blocked"); } }

// ---------- dates ----------
function monday(d){ const x=new Date(d); const day=(x.getDay()+6)%7; x.setHours(0,0,0,0); x.setDate(x.getDate()-day); return x; }
function addDays(d,n){ const x=new Date(d); x.setDate(x.getDate()+n); return x; }
function iso(d){ const y=d.getFullYear(), m=String(d.getMonth()+1).padStart(2,"0"), dd=String(d.getDate()).padStart(2,"0"); return `${y}-${m}-${dd}`; }
function fmt(d){ return d.toLocaleDateString(undefined,{day:"numeric",month:"short"}); }
let weekStart = monday(new Date());

// ---------- elements ----------
const $=s=>document.querySelector(s);
const gridHead=$("#gridHead"), gridBody=$("#gridBody");
const scrim=$("#scrim"), toastEl=$("#toast");
let editingId=null;

function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,6); }
function toast(m){ toastEl.textContent=m; toastEl.classList.add("show"); setTimeout(()=>toastEl.classList.remove("show"),1900); }

// ---------- render: pitch grid ----------
function renderPitch(){
  const ws=weekStart, today=iso(new Date());
  gridHead.innerHTML='<th class="pitch-cell">Pitch</th>'+
    DAYS.map((d,i)=>{ const dd=addDays(ws,i); const t=iso(dd)===today?' today':''; 
      return `<th class="${t.trim()}">${d}<br><small style="font-weight:500;opacity:.85">${fmt(dd)}</small></th>`;}).join("");
  gridBody.innerHTML="";
  ["Senior","Junior"].forEach(pitch=>{
    const tr=document.createElement("tr");
    const ages = pitch==="Senior" ? "U13 → Senior" : "U8 → U12";
    tr.innerHTML=`<td class="pitch-cell">${pitch}<small>${ages}</small></td>`;
    for(let i=0;i<7;i++){
      const dayIso=iso(addDays(ws,i));
      const here=state.fixtures.filter(f=>f.venue==="H"&&f.pitch===pitch&&f.date===dayIso)
                  .sort((a,b)=>(a.time||"").localeCompare(b.time||""));
      const td=document.createElement("td");
      td.className="slot"+(here.length?"":" empty");
      here.forEach(f=>{
        const clash=here.filter(o=>o.time&&o.time===f.time).length>1;
        const b=document.createElement("div");
        b.className="booking "+(pitch==="Senior"?"senior":"junior")+(clash?" clash":"");
        b.innerHTML=
          (f.time?`<div class="time">${f.time}</div>`:"")+
          `<div class="team">${esc(f.team)} v ${esc(f.opp||"TBC")}</div>`+
          `<div class="meta">${esc(f.comp||"")}${f.ref?" • Ref: "+esc(f.ref):""}</div>`+
          (NO_REF.has(f.team)&&!f.ref?'<span class="ref-flag">NO REF</span>':"");
        b.onclick=()=>openModal(f.id);
        td.appendChild(b);
      });
      const add=document.createElement("button");
      add.className="add-slot"; add.textContent="+ book";
      add.onclick=()=>openModal(null,{date:dayIso,venue:"H",pitch});
      td.appendChild(add);
      tr.appendChild(td);
    }
    gridBody.appendChild(tr);
  });
}

// ---------- render: match calendar (single grid, all games, home/away colours) ----------
function renderCalendar(){
  const host=$("#calHost"); host.innerHTML="";
  const ws=weekStart, today=iso(new Date());
  const week=weekFixtures();
  const sec=document.createElement("div");
  sec.className="cal-group all";
  let html=`<div class="cal-group-head">All Matches <small>Home &amp; away · ${week.length} match${week.length===1?"":"es"}</small></div>`;
  html+='<div class="cal-grid">';
  for(let i=0;i<7;i++){ const dd=addDays(ws,i); const t=iso(dd)===today?" today":"";
    html+=`<div class="cal-col-head${t}">${DAYS[i]} ${fmt(dd)}</div>`; }
  for(let i=0;i<7;i++){
    const dayIso=iso(addDays(ws,i));
    const here=week.filter(f=>f.date===dayIso).sort((a,b)=>(a.time||"").localeCompare(b.time||""));
    html+=`<div class="cal-col${here.length?"":" cal-blank"}" data-day="${DAYS[i]} ${fmt(addDays(ws,i))}">`;
    if(here.length){
      here.forEach(f=>{
        const home=f.venue==="H";
        const hasRes=(f.gf!==""&&f.gf!=null&&f.ga!==""&&f.ga!=null);
        let oc=""; if(hasRes){ const a=+f.gf,b=+f.ga; oc=a>b?"W":a<b?"L":"D"; }
        html+=`<div class="cal-fix ${home?"home":"away"}" data-id="${f.id}">`+
          `<div class="t">${f.time?esc(f.time)+" ":""}${esc(f.team)}</div>`+
          `<div class="vs">v ${esc(f.opp||"TBC")}</div>`+
          (hasRes?`<div class="csc">${f.gf}–${f.ga} <span class="oc ${oc}">${oc}</span></div>`:"")+
          `<div class="ha">${home?"HOME":"AWAY"}${f.comp?" · "+esc(f.comp):""}</div>`+
          (f.ref?`<div class="ref">Ref: ${esc(f.ref)}</div>`:(NO_REF.has(f.team)?`<div class="ref">No ref</div>`:""))+
        `</div>`;
      });
    } else { html+='<div class="cal-empty">–</div>'; }
    html+="</div>";
  }
  html+="</div>";
  sec.innerHTML=html;
  host.appendChild(sec);
  host.querySelectorAll(".cal-fix[data-id]").forEach(el=>el.onclick=()=>openModal(el.dataset.id));
}

// ---------- render: fixtures list ----------
function weekFixtures(){
  const a=iso(weekStart), b=iso(addDays(weekStart,6));
  return state.fixtures.filter(f=>f.date>=a&&f.date<=b)
          .sort((x,y)=>(x.date+x.time).localeCompare(y.date+y.time));
}
function renderFixtures(){
  const list=weekFixtures();
  const host=$("#view-fixtures");
  if(!list.length){ host.innerHTML=emptyState("No fixtures this week","Use “+ Add fixture” to schedule one."); return; }
  host.innerHTML=fxTable(list,false);
  wireRows(host);
}
function renderArchive(){
  const host=$("#view-archive");
  const past=state.fixtures.filter(f=>f.date<iso(monday(new Date())))
              .sort((a,b)=>(b.date+b.time).localeCompare(a.date+a.time));
  const ctrl=`<div class="list-head"><div class="filters">
      <select id="ar-team"><option value="">All teams</option>${TEAMS.map(t=>`<option>${t}</option>`).join("")}</select>
      <select id="ar-comp"><option value="">All competitions</option>${["League","Cup","Friendly","Tournament"].map(c=>`<option>${c}</option>`).join("")}</select>
      <input type="search" id="ar-q" placeholder="Search opponent / notes…">
    </div><div class="muted" id="ar-count"></div></div>`;
  host.innerHTML=ctrl+'<div id="ar-table"></div>';
  function draw(){
    const t=$("#ar-team").value, c=$("#ar-comp").value, q=$("#ar-q").value.toLowerCase();
    const f=past.filter(x=>(!t||x.team===t)&&(!c||x.comp===c)&&
        (!q||(x.opp||"").toLowerCase().includes(q)||(x.notes||"").toLowerCase().includes(q)));
    $("#ar-count").textContent=f.length+" result"+(f.length===1?"":"s");
    $("#ar-table").innerHTML = f.length?fxTable(f,true):emptyState("Nothing archived yet","Past fixtures move here automatically once their date has passed.");
    wireRows($("#ar-table"));
  }
  ["#ar-team","#ar-comp","#ar-q"].forEach(s=>$(s).addEventListener("input",draw));
  draw();
}
function fxTable(list,showResult){
  const rows=list.map(f=>{
    const home=f.venue==="H";
    const res=(f.gf!==""&&f.gf!=null&&f.ga!==""&&f.ga!=null);
    let outcome="";
    if(res){ const a=+f.gf,b=+f.ga; outcome=a>b?"W":a<b?"L":"D"; }
    return `<tr data-id="${f.id}" style="cursor:pointer">
      <td data-l="Date">${fmtFull(f.date)}<br><span class="muted">${f.time||""}</span></td>
      <td data-l="Team"><span class="pill ${home?(pitchFor(f.team)==="Senior"?"senior":"junior"):"away"}">${esc(f.team)}</span></td>
      <td data-l="Fixture">${esc(f.opp||"TBC")} <span class="pill ${home?"home":"away"}">${home?"H":"A"}</span><br>
          <span class="muted">${esc(f.comp||"")}${home&&f.pitch?" • "+f.pitch+" pitch":""}</span></td>
      <td data-l="Referee">${f.ref?esc(f.ref):(NO_REF.has(f.team)?'<span class="muted">no ref</span>':'<span class="muted">—</span>')}</td>
      <td data-l="Result">${res?`<span class="score">${f.gf}–${f.ga}</span> <span class="outcome ${outcome}">${outcome}</span>`:'<span class="muted">—</span>'}</td>
      <td data-l="Notes" class="muted">${esc(f.notes||"")}</td>
    </tr>`;}).join("");
  return `<table class="fx"><thead><tr>
    <th>Date</th><th>Team</th><th>Fixture</th><th>Referee</th><th>Result</th><th>Notes</th>
    </tr></thead><tbody>${rows}</tbody></table>`;
}
function wireRows(host){ host.querySelectorAll("tr[data-id]").forEach(r=>r.onclick=()=>openModal(r.dataset.id)); }
function emptyState(h,p){ return `<div class="empty-state"><h3>${h}</h3><p>${p}</p></div>`; }
function fmtFull(s){ const d=new Date(s+"T00:00"); return d.toLocaleDateString(undefined,{weekday:"short",day:"numeric",month:"short"}); }
function esc(s){ return (s==null?"":""+s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }

// ---------- modal ----------
const teamSel=$("#f-team");
teamSel.innerHTML=TEAMS.map(t=>`<option>${t}</option>`).join("");
function syncPitchVenue(){
  const home=$("#f-venue").value==="H";
  $("#pitchField").style.opacity=home?1:.4;
  $("#f-pitch").disabled=!home;
}
function syncTeam(){
  const t=teamSel.value;
  if($("#f-venue").value==="H") $("#f-pitch").value=pitchFor(t);
  $("#refNote").style.display = NO_REF.has(t)?"block":"none";
}
teamSel.addEventListener("change",syncTeam);
$("#f-venue").addEventListener("change",()=>{syncPitchVenue();syncTeam();});

function openModal(id,preset){
  editingId=id;
  const f = id ? state.fixtures.find(x=>x.id===id) : Object.assign(
    {date:iso(weekStart),time:"10:30",team:"U13 Boys",venue:"H",pitch:"Senior",opp:"",comp:"League",ref:"",gf:"",ga:"",notes:""}, preset||{});
  $("#modalTitle").textContent = id?"Edit fixture":"Add fixture";
  $("#f-date").value=f.date; $("#f-time").value=f.time||"";
  $("#f-team").value=f.team; $("#f-venue").value=f.venue;
  $("#f-pitch").value=f.pitch||pitchFor(f.team);
  $("#f-opp").value=f.opp||""; $("#f-comp").value=f.comp||"League";
  $("#f-ref").value=f.ref||""; $("#f-gf").value=f.gf??""; $("#f-ga").value=f.ga??"";
  $("#f-notes").value=f.notes||"";
  $("#deleteBtn").style.display=id?"inline-block":"none";
  syncPitchVenue(); syncTeam();
  scrim.classList.add("open");
}
function closeModal(){ scrim.classList.remove("open"); editingId=null; }
$("#cancelBtn").onclick=closeModal;
scrim.addEventListener("click",e=>{ if(e.target===scrim) closeModal(); });
document.addEventListener("keydown",e=>{ if(e.key==="Escape"&&scrim.classList.contains("open"))closeModal(); });

$("#saveBtn").onclick=()=>{
  const home=$("#f-venue").value==="H";
  const rec={
    id:editingId||uid(),
    date:$("#f-date").value, time:$("#f-time").value,
    team:$("#f-team").value, venue:$("#f-venue").value,
    pitch:home?$("#f-pitch").value:"", opp:$("#f-opp").value.trim(),
    comp:$("#f-comp").value, ref:$("#f-ref").value.trim(),
    gf:$("#f-gf").value, ga:$("#f-ga").value, notes:$("#f-notes").value.trim()
  };
  if(!rec.date){ toast("Pick a date first"); return; }
  if(editingId){ const i=state.fixtures.findIndex(x=>x.id===editingId); state.fixtures[i]=rec; }
  else state.fixtures.push(rec);
  save(); closeModal(); renderAll(); toast(editingId?"Fixture updated":"Fixture added");
};
$("#deleteBtn").onclick=()=>{
  if(!editingId) return;
  if(confirm("Delete this fixture?")){ state.fixtures=state.fixtures.filter(x=>x.id!==editingId); save(); closeModal(); renderAll(); toast("Fixture deleted"); }
};
$("#addBtn").onclick=()=>openModal(null,{date:iso(weekStart)});

// ---------- tabs ----------
let view="pitch";
document.querySelectorAll(".tab").forEach(t=>t.onclick=()=>{
  view=t.dataset.view;
  document.querySelectorAll(".tab").forEach(x=>x.setAttribute("aria-selected",x===t));
  $("#view-pitch").hidden=view!=="pitch";
  $("#view-calendar").hidden=view!=="calendar";
  $("#view-fixtures").hidden=view!=="fixtures";
  $("#view-archive").hidden=view!=="archive";
  renderAll();
});

// ---------- week nav ----------
$("#prevWeek").onclick=()=>{weekStart=addDays(weekStart,-7);renderAll();};
$("#nextWeek").onclick=()=>{weekStart=addDays(weekStart,7);renderAll();};
$("#thisWeek").onclick=()=>{weekStart=monday(new Date());renderAll();};

// ---------- club name + backup ----------
$("#renameBtn").onclick=()=>{ const n=prompt("Club name:",state.club); if(n){ state.club=n.trim(); save(); $("#clubName").textContent=state.club; } };
$("#exportBtn").onclick=()=>{
  const blob=new Blob([JSON.stringify(state,null,2)],{type:"application/json"});
  const a=document.createElement("a"); a.href=URL.createObjectURL(blob);
  a.download=(state.club.replace(/\s+/g,"_"))+"_fixtures_"+iso(new Date())+".json"; a.click();
  toast("Backup downloaded");
};
$("#importBtn").onclick=()=>$("#importFile").click();
$("#importFile").onchange=e=>{
  const file=e.target.files[0]; if(!file) return;
  const r=new FileReader();
  r.onload=()=>{ try{ const d=JSON.parse(r.result);
    if(!d.fixtures) throw 0;
    if(confirm("Replace all current data with this backup?")){ state=d; save(); renderAll(); $("#clubName").textContent=state.club; toast("Backup imported"); }
  }catch(_){ toast("That file isn't a valid backup"); } };
  r.readAsText(file); e.target.value="";
};

// ---------- Excel import ----------
const IMPORT_YEAR=2026;
const MONTHS={jan:0,feb:1,mar:2,apr:3,may:4,jun:5,jul:6,aug:7,sep:8,oct:9,nov:10,dec:11};
function cleanStr(v){ return (v==null?"":(""+v)).replace(/\u00a0/g," ").trim(); }
function parseSheetDate(v){
  // Excel serial / Date object
  if(v instanceof Date && !isNaN(v)) return iso(v);
  if(typeof v==="number" && v>20000){ const d=new Date(Math.round((v-25569)*86400000)); return iso(d); }
  const s=cleanStr(v).toLowerCase();
  if(!s) return "";
  const dm=s.match(/(\d{1,2})\s*(?:st|nd|rd|th)?\s+([a-z]{3})/); // "4th july" / "29 jun"
  if(dm){ const day=+dm[1], mon=MONTHS[dm[2].slice(0,3)]; if(mon!=null){ return iso(new Date(IMPORT_YEAR,mon,day)); } }
  const dd=new Date(s); if(!isNaN(dd)) return iso(dd);
  return ""; // unparseable (e.g. "weekend off")
}
function parseSheetTime(v){
  if(typeof v==="number" && v>=0 && v<1){ const m=Math.round(v*24*60); return String(Math.floor(m/60)).padStart(2,"0")+":"+String(m%60).padStart(2,"0"); }
  if(v instanceof Date && !isNaN(v)) return String(v.getHours()).padStart(2,"0")+":"+String(v.getMinutes()).padStart(2,"0");
  const s=cleanStr(v); const m=s.match(/(\d{1,2})[:.h](\d{2})/); if(m) return m[1].padStart(2,"0")+":"+m[2];
  return "";
}
function matchTeam(raw){
  const s=cleanStr(raw).toLowerCase().replace(/\s+/g," ");
  if(!s) return "";
  for(const t of TEAMS){ if(t.toLowerCase()===s) return t; }                 // exact
  const a=(/u(\d+)/.exec(s)||[])[1];
  const girls=/girl/.test(s), boys=/boy/.test(s);
  for(const t of TEAMS){
    const ta=(/u(\d+)/i.exec(t)||[])[1];
    if(a&&ta&&a===ta&&(girls===/girl/i.test(t))) return t;
  }
  if(/senior\s*wom|ladies|women/.test(s)) return "Senior Women";
  if(/senior\s*men|^senior$|^men/.test(s)) return "Senior Men";
  if(/reserve/.test(s)) return "Reserves";
  return cleanStr(raw); // keep original label so nothing is silently dropped
}
function parseResult(raw,venueHome){
  const s=cleanStr(raw); const m=s.match(/(\d+)\s*[-–:vV]\s*(\d+)/);
  if(!m) return {gf:"",ga:""};
  let gf=+m[1], ga=+m[2];
  // archive sheets write the outcome as text: "5-0 Win", "3-13 Loss", "2-2 Draw".
  // Score is usually written our–their, but a stated Win/Loss lets us verify & fix order.
  const win=/\bwin\b/i.test(s), loss=/\b(loss|lost|defeat|lose)\b/i.test(s);
  if(win && gf<ga){ [gf,ga]=[ga,gf]; }      // "5-0 Win" but written small-big -> swap
  if(loss && gf>ga){ [gf,ga]=[ga,gf]; }
  return {gf:String(gf),ga:String(ga)};
}
function importWorkbook(wb){
  const ws=wb.Sheets[wb.SheetNames[0]];
  const rows=XLSX.utils.sheet_to_json(ws,{header:1,raw:true,defval:""});
  const out=[]; let skipped=0;
  // Find every header row (sheets may stack many week-blocks, each with its own header).
  const headerRows=[];
  rows.forEach((r,i)=>{ if(r && r.some(c=>cleanStr(c).toLowerCase()==="date")) headerRows.push(i); });
  if(!headerRows.length) headerRows.push(0);

  for(let b=0;b<headerRows.length;b++){
    const h=headerRows[b];
    const end=(b+1<headerRows.length)?headerRows[b+1]:rows.length;
    const head=rows[h].map(c=>cleanStr(c).toLowerCase());
    const col=name=>head.findIndex(c=>c.includes(name));
    const dateCol=col("date");
    // Team column = the non-empty column to the LEFT of Date (handles the blank-A layout).
    let teamCol=0;
    for(let k=dateCol-1;k>=0;k--){ if(cleanStr(head[k])===""){ teamCol=k; } }
    if(dateCol>0 && cleanStr(head[dateCol-1])==="") teamCol=dateCol-1;
    const ci={comp:col("competition"),opp:col("oppos"),venue:col("venue"),
              pitch:col("pitch"),time:col("kick"),ref:col("ref"),result:col("result"),notes:col("note")};
    for(let i=h+1;i<end;i++){
      const r=rows[i]; if(!r) continue;
      const team=matchTeam(r[teamCol]);
      if(!team) continue;
      const date=parseSheetDate(r[dateCol]);
      const rowText=r.map(cleanStr).join(" ").toLowerCase();
      if(!date){ skipped++; continue; }                 // blank row, "FREE WEEKEND", "WEEKEND OFF"
      const venueRaw=cleanStr(r[ci.venue]).toLowerCase();
      const home=venueRaw.startsWith("h");
      const res=parseResult(r[ci.result],home);
      let pitch=cleanStr(r[ci.pitch]);
      pitch=/jun/i.test(pitch)?"Junior":/sen/i.test(pitch)?"Senior":(home?pitchFor(team):"");
      let ref=cleanStr(r[ci.ref]); if(/^tbc$/i.test(ref)) ref="";
      // keep any extra outcome text (e.g. "Lost on Pens", "Did not field") in notes
      let notes=cleanStr(r[ci.notes]);
      const resTxt=cleanStr(r[ci.result]).replace(/\d+\s*[-–:]\s*\d+/,"").replace(/\b(win|won|loss|lost|draw|defeat)\b/ig,"").trim();
      if(resTxt) notes=(notes?notes+" — ":"")+resTxt;
      out.push({ id:uid(), date, time:parseSheetTime(r[ci.time]), team, venue:home?"H":"A",
        pitch:home?pitch:"", opp:cleanStr(r[ci.opp]), comp:cleanStr(r[ci.comp])||"League",
        ref, gf:res.gf, ga:res.ga, notes });
    }
  }
  return {out,skipped};
}

// ---------- Excel export (same template layout) ----------
function fmtDateOut(isoStr){
  // "Sat 4th July" to match the club's sheets
  const d=new Date(isoStr+"T00:00"); if(isNaN(d)) return isoStr;
  const day=d.getDate(), suf=(day%10===1&&day!==11)?"st":(day%10===2&&day!==12)?"nd":(day%10===3&&day!==13)?"rd":"th";
  return d.toLocaleDateString("en-GB",{weekday:"short"})+" "+day+suf+" "+d.toLocaleDateString("en-GB",{month:"long"});
}
function resultOut(f){
  if(f.gf===""||f.gf==null||f.ga===""||f.ga==null) return "";
  const a=+f.gf,b=+f.ga; const tag=a>b?"Win":a<b?"Loss":"Draw";
  return `${a}-${b} ${tag}`;
}

  list.slice().sort((a,b)=>(a.date+a.time+a.team).localeCompare(b.date+b.time+b.team)).forEach(f=>{
    if(!CLUBZAP_TEAM[f.team]) unmapped.add(f.team);
    const row=[
      ddmmyyyy(f.date),            // Date
      f.time||"",                  // Time (24h HH:MM)
      f.venue==="H"?"Home":"Away", // Venue = Home/Away (required field)
      "",                          // Ground (left blank)
      f.ref||"",                   // Referee
      clubzapTeam(f.team),         // Team = ClubZap registered name
      f.comp||"",                  // Competition Name
      state.club,                  // Your Club Name
      f.opp||"",                   // Opponent
      ""                           // Event Type (left blank)
    ];
    lines.push(row.map(csvCell).join(","));
  });
  buildClubZapCSV._unmapped=[...unmapped];
  return "\ufeff"+lines.join("\r\n")+"\r\n"; // BOM + CRLF to match ClubZap template
}
$("#clubzapBtn").onclick=()=>{
  let list=weekFixtures();
  const total=state.fixtures.length;
  if(total>list.length){
    if(!confirm(`Export THIS WEEK only (${list.length} fixture${list.length===1?"":"s"})?\n\nOK = this week  •  Cancel = all ${total} fixtures`)){
      list=state.fixtures.slice();
    }
  }
  if(!list.length){ toast("No fixtures to export"); return; }
  const csv=buildClubZapCSV(list);
  const blob=new Blob([csv],{type:"text/csv;charset=utf-8"});
  const a=document.createElement("a"); a.href=URL.createObjectURL(blob);
  a.download=(state.club.replace(/\s+/g,"_"))+"_clubzap_"+iso(weekStart)+".csv"; a.click();
  const un=buildClubZapCSV._unmapped||[];
  if(un.length){ toast(`CSV done — check team name${un.length>1?"s":""}: ${un.join(", ")}`); }
  else { toast(`ClubZap CSV: ${list.length} fixtures`); }
};

// ---------- render all ----------
function renderAll(){
  $("#clubName").textContent=state.club;
  $("#weekTitle").textContent="Week of "+fmt(weekStart);
  $("#weekSub").textContent=fmt(weekStart)+" – "+fmt(addDays(weekStart,6));
  if(view==="pitch") renderPitch();
  if(view==="calendar") renderCalendar();
  if(view==="fixtures") renderFixtures();
  if(view==="archive") renderArchive();
}
renderAll();
})();
</script>
